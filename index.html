<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with theme toggle -->
        <div class="header">
            <h1>Calculator</h1>
            <button class="theme-toggle" id="themeToggle">
                <span class="theme-icon">🌙</span>
            </button>
        </div>

        <!-- Main calculator -->
        <div class="calculator">
            <!-- Display section -->
            <div class="display">
                <div class="expression" id="expression">0</div>
                <div class="current-input" id="currentInput">0</div>
            </div>

            <!-- Buttons grid -->
            <div class="buttons-grid">
                <!-- Row 1 -->
                <button class="btn function-btn" data-action="clear">C</button>
                <button class="btn function-btn" data-action="toggleSign">+/-</button>
                <button class="btn function-btn" data-action="percent">%</button>
                <button class="btn operator-btn" data-operator="÷">÷</button>

                <!-- Row 2 -->
                <button class="btn number-btn" data-number="7">7</button>
                <button class="btn number-btn" data-number="8">8</button>
                <button class="btn number-btn" data-number="9">9</button>
                <button class="btn operator-btn" data-operator="×">×</button>

                <!-- Row 3 -->
                <button class="btn number-btn" data-number="4">4</button>
                <button class="btn number-btn" data-number="5">5</button>
                <button class="btn number-btn" data-number="6">6</button>
                <button class="btn operator-btn" data-operator="−">−</button>

                <!-- Row 4 -->
                <button class="btn number-btn" data-number="1">1</button>
                <button class="btn number-btn" data-number="2">2</button>
                <button class="btn number-btn" data-number="3">3</button>
                <button class="btn operator-btn" data-operator="+">+</button>

                <!-- Row 5 -->
                <button class="btn number-btn wide" data-number="0">0</button>
                <button class="btn function-btn" data-action="decimal">.</button>
                <button class="btn equals-btn" data-action="equals">=</button>
            </div>
        </div>

        <!-- History section -->
        <div class="history-section">
            <div class="history-header">
                <h3>History</h3>
                <button class="clear-history-btn" id="clearHistoryBtn">Clear</button>
            </div>
            <div class="history-list" id="historyList">
                <p class="empty-history">No history yet</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
